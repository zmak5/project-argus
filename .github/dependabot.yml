# Mises à jour automatiques des dépendances : Dependabot ouvre une PR quand
# une dépendance Python ou une action GitHub a une nouvelle version — la CI
# valide la PR, il ne reste qu'à merger.
version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: [dependances]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: [dependances]
